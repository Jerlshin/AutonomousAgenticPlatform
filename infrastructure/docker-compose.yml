version: '3.8'

services:
  # 1. Relational Database: Holds structural agent states, history, and system metadata
  postgres:
    image: postgres:16-alpine
    container_name: ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
      POSTGRES_DB: platform_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d platform_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. In-Memory Cache & Message Broker: Manages live agent communications and Celery tasks
  redis:
    image: redis:7-alpine
    container_name: ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. Vector Database: Powering the Research Agent's long-term RAG knowledge memory
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: ai_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 4. MLOps Lifecycle Tracker: Logs parameters, model iterations, and evaluation runs
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: ai_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    # Runs an internal SQLite db & file directory inside the volume for solo developer simplicity
    command: >
      mlflow server 
      --host 0.0.0.0 
      --port 5000 
      --backend-store-uri sqlite:///mlflow/mlflow.db 
      --default-artifact-root /mlflow/artifacts

volumes:
  postgres_data:
  qdrant_data:
  mlflow_data: